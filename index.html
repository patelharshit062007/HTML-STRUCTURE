<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SATIC | Electronics Store</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#020617;
    --accent:#6366f1;
    --accent2:#8b5cf6;
    --radius:20px;
    --transition:0.4s ease;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:linear-gradient(135deg,#eef2ff,#fdf4ff);
}

.navbar{
    position:fixed;
    width:100%;
    top:0;
    padding:1rem 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.6);
}

.logo{
    font-size:1.5rem;
    font-weight:800;
}

.logo span{color:var(--accent);}

.cart-btn{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
}

.hero{
    padding:140px 20px 60px;
    text-align:center;
}

.hero h1{
    font-size:3rem;
    background:linear-gradient(to right,#6366f1,#8b5cf6);
    -webkit-background-clip:text;
    color:transparent;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    transition:var(--transition);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.img-box{
    height:250px;
    overflow:hidden;
}

.img-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.content{
    padding:15px;
}

.name{
    font-weight:700;
    margin:10px 0;
}

.price{
    font-weight:800;
}

.btn{
    background:var(--primary);
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
}

footer{
    text-align:center;
    padding:40px;
    background:var(--primary);
    color:white;
}
</style>
</head>

<body>

<nav class="navbar">
<div class="logo">SATIC.SHOP<span>.</span></div>
<button class="cart-btn">Cart (<span id="cart">0</span>)</button>
</nav>

<section class="hero">
<h1>Electronics Items</h1>
</section>

<div class="container">
<div class="grid">

<div class="card">
<div class="img-box">
<img src="https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=1200&auto=format&fit=crop">
</div>
<div class="content">
<div class="name">Galaxy S24 Ultra</div>
<div class="price">₹1,10,000</div>
<button class="btn" onclick="addCart()">Buy</button>
</div>
</div>

<div class="card">
<div class="img-box">
<img src="https://images.unsplash.com/photo-1678911820864-e2c567c655d7?q=80&w=900">
</div>
<div class="content">
<div class="name">Galaxy Z Fold 5</div>
<div class="price">₹1,75,000</div>
<button class="btn" onclick="addCart()">Buy</button>
</div>
</div>

<div class="card">
<div class="img-box">
<img src="https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?q=80&w=900">
</div>
<div class="content">
<div class="name">Galaxy S23+</div>
<div class="price">₹1,00,000</div>
<button class="btn" onclick="addCart()">Buy</button>
</div>
</div>

<div class="card">
<div class="img-box">
<img src="https://images.unsplash.com/photo-1612444530582-fc66183b16f7?q=80&w=900">
</div>
<div class="content">
<div class="name">Headphones</div>
<div class="price">₹10,000</div>
<button class="btn" onclick="addCart()">Buy</button>
</div>
</div>

<div class="card">
<div class="img-box">
<img src="https://images.unsplash.com/photo-1603302576837-37561b2e2302?q=80&w=900">
</div>
<div class="content">
<div class="name">Victus G15</div>
<div class="price">₹1,00,000</div>
<button class="btn" onclick="addCart()">Buy</button>
</div>
</div>

<div class="card">
<div class="img-box">
<img src="https://images.unsplash.com/photo-1606144042614-b2417e99c4e3?q=80&w=1200&auto=format&fit=crop">
</div>
<div class="content">
<div class="name">PlayStation 5</div>
<div class="price">₹54,990</div>
<button class="btn" onclick="addCart()">Buy</button>
</div>
</div>

</div>
</div>

<footer>
<p>© 2026 SATIC SHOP</p>
</footer>

<script>
let count = 0;

function addCart(){
    count++;
    document.getElementById("cart").innerText = count;
}
</script>

</body>
</html>
